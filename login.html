<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="icon" type="image/png" href="./icone_novo.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Tilt Warp", sans-serif;
      background: linear-gradient(#000000, #000000);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .dark {
      background: white !important;
      color: black !important;
    }

    .dark .login-card {
      background:
        radial-gradient(circle at top left, rgba(255,120,180,0.14), transparent 38%),
        radial-gradient(circle at bottom right, rgba(120,220,255,0.14), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.55)) !important;
      border-color: rgba(0,0,0,0.16) !important;
      box-shadow:
        inset 0 1px 0 rgba(0,0,0,0.04),
        0 6px 18px rgba(0,0,0,0.06) !important;
      color: black !important;
    }

    .dark p,
    .dark h1,
    .dark h2,
    .dark h3,
    .dark label,
    .dark input,
    .dark button,
    .dark a {
      color: black !important;
    }

    .login-card {
      width: 100%;
      max-width: 480px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 28px;
      padding: 28px;
      background:
        radial-gradient(circle at top left, rgba(255,120,180,0.14), transparent 38%),
        radial-gradient(circle at bottom right, rgba(120,220,255,0.14), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 10px 28px rgba(0,0,0,0.10);
    }

    .login-card h1 {
      font-size: 36px;
      font-weight: 100;
      margin-bottom: 10px;
    }

    .login-card p,
    label,
    input {
      font-family: Quicksand, sans-serif;
    }

    .login-card p {
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .campo {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .campo input {
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.10);
      color: white;
      outline: none;
      font-size: 16px;
    }

    .campo input::placeholder {
      color: rgba(255,255,255,0.72);
    }

    .dark .campo input {
      background: rgba(255,255,255,0.85);
    }

    .acoes {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      color: black;
      background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(255,255,255,0.70));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.90),
        0 6px 18px rgba(0,0,0,0.10);
      text-decoration: none;
      font-family: Quicksand, sans-serif;
    }

    .status {
      display: none;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.18);
      font-family: Quicksand, sans-serif;
    }

    .status.ativo {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>architect admin</h1>
    <p>Entre para acessar a área administrativa e visualizar as mensagens enviadas pelo site.</p>

    <div class="campo">
      <label for="usuarioAdmin">Usuário</label>
      <input type="text" id="usuarioAdmin" placeholder="Digite o usuário">
    </div>

    <div class="campo">
      <label for="senhaAdmin">Senha</label>
      <input type="password" id="senhaAdmin" placeholder="Digite a senha">
    </div>

    <div class="acoes">
      <button class="btn" id="btnEntrar" type="button">Entrar</button>
      <button class="btn" id="btnTema" type="button">Alternar tema</button>
      <a class="btn" href="./index.html">Voltar ao site</a>
    </div>

    <div class="status" id="statusLogin"></div>
  </div>

  <script>
    const USUARIO_CORRETO = "admin";
    const SENHA_CORRETA = "1234";

    const btnEntrar = document.getElementById("btnEntrar");
    const btnTema = document.getElementById("btnTema");
    const statusLogin = document.getElementById("statusLogin");

    function aplicarTemaSalvo() {
      const temaSalvo = localStorage.getItem("tema");
      if (temaSalvo === "dark") {
        document.body.classList.add("dark");
      }
    }

    btnTema.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("tema", document.body.classList.contains("dark") ? "dark" : "light");
    });

    btnEntrar.addEventListener("click", () => {
      const usuario = document.getElementById("usuarioAdmin").value.trim();
      const senha = document.getElementById("senhaAdmin").value.trim();

      statusLogin.classList.add("ativo");

      if (usuario === USUARIO_CORRETO && senha === SENHA_CORRETA) {
        sessionStorage.setItem("adminAutenticado", "true");
        statusLogin.innerHTML = "<p><strong>Login realizado com sucesso.</strong></p>";
        window.location.href = "./admin.html";
      } else {
        statusLogin.innerHTML = "<p><strong>Usuário ou senha incorretos.</strong></p>";
      }
    });

    aplicarTemaSalvo();
  </script>
</body>
</html>
