<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Architect</title>
  <link rel="icon" type="image/png" href="./icone_novo.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tilt+Warp&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Tilt Warp", sans-serif;
      background: linear-gradient(#000000, #000000);
      color: white;
      min-height: 100vh;
      padding: 32px 20px 60px;
    }

    .dark {
      background: white !important;
      color: black !important;
    }

    .dark .topbar,
    .dark .painel-card,
    .dark .mensagem-card,
    .dark .filtro-card {
      background:
        radial-gradient(circle at top left, rgba(255,120,180,0.14), transparent 38%),
        radial-gradient(circle at bottom right, rgba(120,220,255,0.14), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.55)) !important;
      border-color: rgba(0,0,0,0.16) !important;
      box-shadow:
        inset 0 1px 0 rgba(0,0,0,0.04),
        0 6px 18px rgba(0,0,0,0.06) !important;
      color: black !important;
    }

    .dark p,
    .dark h1,
    .dark h2,
    .dark h3,
    .dark span,
    .dark strong,
    .dark label,
    .dark input,
    .dark select,
    .dark textarea,
    .dark a,
    .dark button {
      color: black !important;
    }

    .topbar {
      max-width: 1200px;
      margin: 0 auto 28px;
      padding: 18px 22px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(255,120,180,0.14), transparent 38%),
        radial-gradient(circle at bottom right, rgba(120,220,255,0.14), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 10px 28px rgba(0,0,0,0.10);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .marca {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .marca h1 {
      font-size: 34px;
      font-weight: 100;
    }

    .marca p {
      font-family: Quicksand, sans-serif;
      font-size: 15px;
      opacity: 0.9;
    }

    .acoes-topo {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      color: black;
      background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(255,255,255,0.70));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.90),
        0 6px 18px rgba(0,0,0,0.10);
      text-decoration: none;
      font-family: Quicksand, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .resumo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .painel-card,
    .filtro-card,
    .mensagem-card {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      padding: 22px;
      background:
        radial-gradient(circle at top left, rgba(255,120,180,0.14), transparent 38%),
        radial-gradient(circle at bottom right, rgba(120,220,255,0.14), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 10px 28px rgba(0,0,0,0.10);
    }

    .painel-card h3,
    .filtro-card h3,
    .mensagem-card h3 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .painel-card p,
    .filtro-card p,
    .mensagem-card p,
    .mensagem-card li,
    label,
    input,
    select {
      font-family: Quicksand, sans-serif;
    }

    .numero {
      font-size: 40px;
      line-height: 1;
      margin-top: 10px;
    }

    .filtro-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .campo {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .campo input,
    .campo select {
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.10);
      color: white;
      outline: none;
      font-size: 15px;
    }

    .dark .campo input,
    .dark .campo select {
      background: rgba(255,255,255,0.85);
    }

    .campo select option {
      color: black;
    }

    .mensagens-lista {
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    .mensagem-topo {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .mensagem-topo h3 {
      margin-bottom: 0;
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      font-size: 13px;
      font-family: Quicksand, sans-serif;
    }

    .mensagem-meta {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
    }

    .mensagem-texto {
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .vazio {
      text-align: center;
      font-family: Quicksand, sans-serif;
      opacity: 0.9;
      padding: 30px 20px;
    }

    @media (max-width: 800px) {
      .filtro-grid {
        grid-template-columns: 1fr;
      }
    }


    .grafico-lista {
  display: grid;
  gap: 14px;
  margin-top: 12px;
}

.grafico-item {
  display: grid;
  gap: 8px;
}

.grafico-topo {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-family: Quicksand, sans-serif;
  font-size: 14px;
}

.grafico-barra-fundo {
  width: 100%;
  height: 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.10);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.10);
}

.grafico-barra {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(255,255,255,0.95), rgba(255,255,255,0.45));
  transition: width 0.4s ease;
}

.dark .grafico-barra-fundo {
  background: rgba(0,0,0,0.08);
  border-color: rgba(0,0,0,0.10);
}

.dark .grafico-barra {
  background: linear-gradient(90deg, rgba(0,0,0,0.85), rgba(0,0,0,0.35));
}

  </style>
</head>
<body>
  <div class="topbar">
    <div class="marca">
      <h1>architect admin</h1>
      <p>Painel de mensagens e acompanhamento do sistema</p>
    </div>

    <div class="acoes-topo">
     <button class="btn" id="btnSair" type="button">Sair</button>
      <a class="btn" href="./index.html">Voltar ao site</a>
      <button class="btn" id="btnTema" type="button">Alternar tema</button>
    </div>
  </div>

  <div class="container">
    <div class="resumo-grid">
  <div class="painel-card">
    <h3>Total de mensagens</h3>
    <div class="numero" id="totalMensagens">0</div>
  </div>

  <div class="painel-card">
    <h3>Residencial</h3>
    <div class="numero" id="totalResidencial">0</div>
  </div>

  <div class="painel-card">
    <h3>Comercial</h3>
    <div class="numero" id="totalComercial">0</div>
  </div>

  <div class="painel-card">
    <h3>Interiores / outros</h3>
    <div class="numero" id="totalOutros">0</div>
  </div>
</div>
    <div class="filtro-card">
      <h3>Filtrar mensagens</h3>
      <div class="filtro-grid">
        <div class="campo">
          <label for="buscaTexto">Buscar por nome, e-mail ou mensagem</label>
          <input type="text" id="buscaTexto" placeholder="Digite para filtrar">
        </div>

        <div class="campo">
          <label for="filtroInteresse">Interesse</label>
          <select id="filtroInteresse">
            <option value="">Todos</option>
            <option value="Residencial">Residencial</option>
            <option value="Comercial">Comercial</option>
            <option value="Interiores">Interiores</option>
            <option value="Consultoria">Consultoria</option>
          </select>
        </div>

        <div class="campo">
          <label for="ordenacao">Ordenação</label>
          <select id="ordenacao">
            <option value="desc">Mais recentes</option>
            <option value="asc">Mais antigas</option>
          </select>
        </div>
      </div>
    </div>

    <div class="mensagens-lista" id="mensagensLista">
      <div class="mensagem-card vazio">Carregando mensagens...</div>
    </div>
  </div>

<script>
  const btnSair = document.getElementById("btnSair");

  btnSair.addEventListener("click", () => {
    sessionStorage.removeItem("adminAutenticado");
    window.location.href = "./login.html";
  });

  if (sessionStorage.getItem("adminAutenticado") !== "true") {
    window.location.href = "./login.html";
  }

  const API_URL = "https://architect-api-production-b070.up.railway.app";

  const mensagensLista = document.getElementById("mensagensLista");
  const buscaTexto = document.getElementById("buscaTexto");
  const filtroInteresse = document.getElementById("filtroInteresse");
  const ordenacao = document.getElementById("ordenacao");
  const btnTema = document.getElementById("btnTema");

  const totalMensagens = document.getElementById("totalMensagens");
  const totalResidencial = document.getElementById("totalResidencial");
  const totalComercial = document.getElementById("totalComercial");
  const totalOutros = document.getElementById("totalOutros");

  let mensagens = [];

  function aplicarTemaSalvo() {
    const temaSalvo = localStorage.getItem("tema");
    if (temaSalvo === "dark") {
      document.body.classList.add("dark");
    }
  }

  btnTema.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    localStorage.setItem(
      "tema",
      document.body.classList.contains("dark") ? "dark" : "light"
    );
  });

  function formatarData(dataTexto) {
    if (!dataTexto) return "Sem data";

    try {
      const data = new Date(dataTexto);
      if (isNaN(data.getTime())) return dataTexto;
      return data.toLocaleString("pt-BR");
    } catch {
      return dataTexto;
    }
  }

  function atualizarResumo(lista) {
    totalMensagens.textContent = lista.length;

    totalResidencial.textContent = lista.filter(
      x => (x.interesse || "").toLowerCase() === "residencial"
    ).length;

    totalComercial.textContent = lista.filter(
      x => (x.interesse || "").toLowerCase() === "comercial"
    ).length;

    totalOutros.textContent = lista.filter(x => {
      const interesse = (x.interesse || "").toLowerCase();
      return interesse !== "residencial" && interesse !== "comercial";
    }).length;
  }

  function renderizarMensagens() {
    const texto = buscaTexto.value.trim().toLowerCase();
    const interesse = filtroInteresse.value;
    const ordem = ordenacao.value;

    let lista = [...mensagens];

    if (texto) {
      lista = lista.filter(msg =>
        (msg.nome || "").toLowerCase().includes(texto) ||
        (msg.email || "").toLowerCase().includes(texto) ||
        (msg.mensagem || "").toLowerCase().includes(texto)
      );
    }

    if (interesse) {
      lista = lista.filter(msg => (msg.interesse || "") === interesse);
    }

    lista.sort((a, b) => {
      if (ordem === "asc") return (a.id || 0) - (b.id || 0);
      return (b.id || 0) - (a.id || 0);
    });

    atualizarResumo(lista);

    if (!lista.length) {
      mensagensLista.innerHTML = `<div class="mensagem-card vazio">Nenhuma mensagem encontrada.</div>`;
      return;
    }

    mensagensLista.innerHTML = lista.map(msg => `
      <div class="mensagem-card">
        <div class="mensagem-topo">
          <h3>${msg.nome || "Sem nome"}</h3>
          <span class="tag">${msg.interesse || "Sem interesse"}</span>
        </div>

        <div class="mensagem-meta">
          <p><strong>E-mail:</strong> ${msg.email || "-"}</p>
          <p><strong>Telefone:</strong> ${msg.telefone || "-"}</p>
          <p><strong>Data:</strong> ${formatarData(msg.dataCriacao)}</p>
        </div>

        <p class="mensagem-texto"><strong>Mensagem:</strong> ${msg.mensagem || "-"}</p>

        <div style="margin-top: 14px;">
          <button class="btn" type="button" onclick="excluirMensagem(${msg.id})">
            Excluir
          </button>
        </div>
      </div>
    `).join("");
  }

  async function carregarMensagens() {
    try {
      const res = await fetch(`${API_URL}/api/messages`);
      const data = await res.json();

      if (!res.ok) {
        throw new Error("Não foi possível carregar as mensagens.");
      }

      mensagens = Array.isArray(data) ? data : [];
      renderizarMensagens();
    } catch (erro) {
      mensagensLista.innerHTML = `<div class="mensagem-card vazio">Erro ao carregar mensagens.</div>`;
      console.error("Erro ao carregar mensagens:", erro);
    }
  }

  async function excluirMensagem(id) {
    const confirmar = confirm("Tem certeza que deseja excluir esta mensagem?");
    if (!confirmar) return;

    try {
      const res = await fetch(`${API_URL}/api/messages/${id}`, {
        method: "DELETE"
      });

      if (!res.ok) {
        const textoErro = await res.text();
        throw new Error(textoErro || "Não foi possível excluir a mensagem.");
      }

      mensagens = mensagens.filter(msg => msg.id !== id);
      renderizarMensagens();
    } catch (erro) {
      alert("Erro ao excluir mensagem.");
      console.error("Erro ao excluir:", erro);
    }
  }

  buscaTexto.addEventListener("input", renderizarMensagens);
  filtroInteresse.addEventListener("change", renderizarMensagens);
  ordenacao.addEventListener("change", renderizarMensagens);

  aplicarTemaSalvo();
  carregarMensagens();
</script>
</body>
</html>
